<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Ganeante Fourniture | Oran</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Noto+Sans+Arabic:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main-font: 'Noto Sans Arabic', 'Plus Jakarta Sans', sans-serif; }
        body { font-family: var(--main-font); background-color: #050505; color: #fff; overflow-x: hidden; transition: all 0.3s ease; }
        .gold-gradient { background: linear-gradient(135deg, #d4af37 0%, #f1d592 50%, #b8860b 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); }
        .category-card { cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .category-card:hover { border-color: #d4af37; transform: translateY(-10px); background: rgba(212, 175, 55, 0.05); }
        .btn-gold { background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%); }
        [dir="ltr"] .nav-links { flex-direction: row; }
        [dir="rtl"] .nav-links { flex-direction: row-reverse; }
        
        .modal-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; width: 100%; outline: none; transition: 0.3s; color: white; }
        .modal-input:focus { border-color: #d4af37; background: rgba(255,255,255,0.08); }
        option { background: #111; color: white; }

        .qty-btn { width: 45px; height: 45px; display: flex; items-center; justify-content: center; background: rgba(255,255,255,0.1); border-radius: 10px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .qty-btn:hover { background: #d4af37; color: black; border-color: #d4af37; }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="fixed w-full z-50 glass px-8 py-4 flex justify-between items-center top-0">
        <div class="text-2xl font-extrabold tracking-tighter gold-gradient uppercase">La Ganeante</div>
        <div class="hidden md:flex gap-8 text-[12px] font-bold uppercase tracking-widest text-gray-400 nav-links">
            <button onclick="toggleLanguage()" id="lang-toggle" class="text-[#d4af37] border border-[#d4af37]/30 px-3 py-1 rounded-md hover:bg-[#d4af37] hover:text-black transition">FR / AR</button>
            <a href="#" onclick="showHome()" data-i18n="nav-home" class="hover:text-white transition">الرئيسية</a>
            <a href="#catalogue" onclick="showHome()" data-i18n="nav-catalog" class="hover:text-white transition">الكتالوج</a>
        </div>
        <a href="tel:0558742463" class="bg-white text-black px-6 py-2 rounded-full font-bold text-xs hover:bg-[#d4af37] transition">0558742463</a>
    </nav>

    <main id="main-content">
        <section id="hero" class="h-screen flex flex-col justify-center items-center text-center px-6">
            <span class="text-[#d4af37] text-xs font-bold tracking-[0.3em] uppercase mb-4 italic" data-i18n="hero-location">وهران، الجزائر</span>
            <h1 class="text-5xl md:text-8xl font-black mb-6 leading-tight tracking-tighter uppercase">
                <span data-i18n="hero-title-1">شريككم في</span> <br> <span class="gold-gradient italic" data-i18n="hero-title-2">النجاح</span>
            </h1>
            <p class="max-w-2xl text-gray-500 text-lg font-light leading-relaxed mb-10" data-i18n="hero-desc">
                بيع بالجملة في عدة قطاعات: الإعلام الآلي، الأدوات المكتبية، الأثاث، والأجهزة الكهرومنزلية.
            </p>
            <button onclick="document.getElementById('catalogue').scrollIntoView()" class="btn-gold text-black px-10 py-4 rounded-xl font-black uppercase text-xs" data-i18n="hero-btn">استكشف الكتالوج</button>
        </section>

        <section id="catalogue" class="py-24 px-8 max-w-7xl mx-auto">
            <div class="mb-16">
                <h2 class="text-4xl font-black uppercase tracking-tighter italic">
                    <span data-i18n="cat-title-1">نشاطاتنا</span> <span class="text-[#d4af37]" data-i18n="cat-title-2">الرئيسية</span>
                </h2>
                <div class="h-1 w-20 bg-[#d4af37] mt-4"></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="category-grid"></div>
        </section>
    </main>

    <section id="product-view" class="hidden pt-32 pb-24 px-8 max-w-7xl mx-auto min-h-screen">
        <button onclick="showHome()" class="text-[#d4af37] text-xs font-bold uppercase tracking-widest mb-12 flex items-center gap-2 hover:opacity-70 transition" data-i18n="back-btn">
            &rarr; العودة إلى الكتالوج
        </button>
        <h2 id="view-title" class="text-5xl md:text-7xl font-black uppercase tracking-tighter mb-4 gold-gradient"></h2>
        <p id="view-desc" class="text-gray-500 mb-16 max-w-2xl text-lg"></p>
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
    </section>

    <!-- Order Modal -->
    <div id="order-modal" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/90 backdrop-blur-md p-4">
        <div class="glass p-8 rounded-3xl max-w-md w-full border-[#d4af37]/30 shadow-2xl">
            <h3 class="text-2xl font-black gold-gradient mb-2 uppercase" data-i18n="modal-title">طلب تسعيرة</h3>
            <p id="modal-product-name" class="text-gray-400 text-xs mb-6 uppercase tracking-widest font-bold"></p>
            <form id="order-form" class="space-y-4">
                <input type="text" id="cust-name" placeholder="الاسم الكامل / Nom Complet" class="modal-input" required>
                
                <input type="text" id="cust-phone" placeholder="رقم الهاتف / Téléphone" 
                       class="modal-input" required 
                       inputmode="numeric" 
                       oninput="this.value = this.value.replace(/[^0-9]/g, '');"
                       maxlength="10">

                <div class="flex items-center gap-4 bg-white/5 p-2 rounded-xl border border-white/10">
                    <span class="text-xs uppercase font-bold text-gray-500 px-2" data-i18n="qty-label">الكمية</span>
                    <div class="flex flex-1 items-center justify-between">
                        <button type="button" onclick="changeQty(-1)" class="qty-btn font-black">-</button>
                        <input type="number" id="cust-qty" class="bg-transparent text-center font-bold text-xl w-full outline-none" min="1" value="1" required readonly>
                        <button type="button" onclick="changeQty(1)" class="qty-btn font-black">+</button>
                    </div>
                </div>
                
                <select id="cust-wilaya" class="modal-input" required>
                    <option value="" disabled selected>اختر الولاية / Sélectionner Wilaya</option>
                </select>

                <textarea id="cust-msg" placeholder="تفاصيل إضافية / Message" class="modal-input h-24 resize-none"></textarea>
                <div class="flex gap-4 pt-2">
                    <button type="button" onclick="closeModal()" class="flex-1 py-4 text-gray-500 font-bold uppercase text-[10px]">إلغاء</button>
                    <button type="submit" class="flex-1 btn-gold text-black py-4 rounded-xl font-black uppercase text-[10px]">إرسال الطلب</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="py-12 border-t border-white/5 px-8 flex flex-col md:flex-row justify-between items-center text-[10px] text-gray-600 uppercase tracking-[0.2em]">
        <p>© 2026 La Ganeante Fourniture - <span data-i18n="footer-city">وهران، الجزائر</span></p>
        <div class="flex gap-8 mt-4 md:mt-0">
            <span>0558 74 24 63</span>
        </div>
    </footer>

    <script>
        let currentLang = 'ar';
        let currentCategory = ""; 

        const wilayas = [
            "01 Adrar", "02 Chlef", "03 Laghouat", "04 Oum El Bouaghi", "05 Batna", "06 Béjaïa", "07 Biskra", "08 Béchar", "09 Blida", "10 Bouira", 
            "11 Tamanrasset", "12 Tébessa", "13 Tlemcen", "14 Tiaret", "15 Tizi Ouzou", "16 Alger", "17 Djelfa", "18 Jijel", "19 Sétif", "20 Saïda", 
            "21 Skikda", "22 Sidi Bel Abbès", "23 Annaba", "24 Guelma", "25 Constantine", "26 Médéa", "27 Mostaganem", "28 M'Sila", "29 Mascara", "30 Ouargla", 
            "31 Oran", "32 El Bayadh", "33 Illizi", "34 Bordj Bou Arréridj", "35 Boumerdès", "36 El Tarf", "37 Tindouf", "38 Tissemsilt", "39 El Oued", "40 Khenchela", 
            "41 Souk Ahras", "42 Tipaza", "43 Mila", "44 Aïn Defla", "45 Naâma", "46 Aïn Témouchent", "47 Ghardaïa", "48 Relizane", "49 El M'Ghair", "50 El Meniaa", 
            "51 Ouled Djellal", "52 Bordj Badji Mokhtar", "53 Béni Abbès", "54 Timimoun", "55 Touggourt", "56 Djanet", "57 In Salah", "58 In Guezzam"
        ];

        const translations = {
            ar: {
                "nav-home": "الرئيسية", "nav-catalog": "الكتالوج", "hero-location": "وهران، الجزائر",
                "hero-title-1": "شريككم في", "hero-title-2": "النجاح", "hero-desc": "بيع بالجملة في عدة قطاعات: الإعلام الآلي، الأدوات المكتبية، الأثاث، والأجهزة الكهرومنزلية.",
                "hero-btn": "استكشف الكتالوج", "cat-title-1": "نشاطاتنا", "cat-title-2": "الرئيسية",
                "back-btn": "← العودة إلى الكتالوج", "footer-city": "وهران، الجزائر", "quote": "طلب تسعيرة", 
                "modal-title": "تأكيد الطلب", "order-success": "تم إرسال طلبك بنجاح!", "qty-label": "الكمية"
            },
            fr: {
                "nav-home": "ACCUEIL", "nav-catalog": "CATALOGUE", "hero-location": "ORAN, ALGÉRIE",
                "hero-title-1": "PARTENAIRE DE", "hero-title-2": "VOTRE RÉUSSITE", "hero-desc": "Vente en gros multi-secteurs : Informatique, Bureautique, Ameublement et Équipements.",
                "hero-btn": "EXPLORER LE CATALOGUE", "cat-title-1": "NOS", "cat-title-2": "ACTIVITÉS",
                "back-btn": "← RETOUR AU CATALOGUE", "footer-city": "ORAN, ALGÉRIE", "quote": "DEMANDER UN DEVIS",
                "modal-title": "CONFIRMER LA DEMANDE", "order-success": "Votre demande a été envoyée !", "qty-label": "Quantité"
            }
        };

        function changeQty(val) {
            const qtyInput = document.getElementById('cust-qty');
            let current = parseInt(qtyInput.value);
            if(current + val >= 1) qtyInput.value = current + val;
        }

        const catalogData = {
            ar: {
                "الإعلام الآلي والمكتبية": {
                    desc: "حلول تقنية عالية الأداء للمؤسسات: خوادم، محطات عمل وملحقاتها.",
                    items: [
                        { name: "محطة عمل محمولة", img: "laptop.jpg" },
                        { name: "خادم سحابي للمؤسسات", img: "cloud_server_1.png" },
                        { name: "شاشة LG احترافية", img: "montor.png" },
                        { name: "طابعة ليزر", img: "imprimante laser.png" }
                    ]
                },
                "الوراقة والفنون الجميلة": {
                    desc: "لوازم مكتبية متميزة وأدوات للفنانين المحترفين.",
                    items: [
                        { name: "وراقة مكتبية", img: "fourniture-de-bureau-tunisie-1024x647-1-770x500.png" },
                        { name: "أدوات الفنون الجميلة", img: "bureau.png" }
                    ]
                },
                "الأجهزة الكهرومنزلية والصحية": {
                    desc: "تجهيزات كهرومنزلية وحلول صحية متطورة.",
                    items: [
                        { name: "أجهزة كهرومنزلية", img: "Électroménager.jpg" },
                        { name: "تجهيزات صحية", img: "Sanitaire.jpg" }
                    ]
                },
                "لوازم التعليم": {
                    desc: "معدات متخصصة للتعليم والمؤسسات التربوية.",
                    items: [{ name: "Équipement Éducatif", img: "Équipement Éducatif.jpg" }]
                },
                "توزيع المواد شبه الصيدلانية": {
                    desc: "منتجات العناية، النظافة والمواد شبه الصيدلانية.",
                    items: [{ name: "Para-pharmaceutique", img: "Para-pharmaceutique.jpg" }]
                }
            },
            fr: {
                "Informatique & Bureautique": {
                    desc: "Solutions haute performance : Serveurs, stations de travail et périphériques.",
                    items: [
                        { name: "Station de Travail", img: "laptop.jpg" },
                        { name: "Serveur Cloud", img: "cloud_server_1.png" },
                        { name: "Moniteur LG Pro", img: "montor.png" },
                        { name: "Imprimante Laser", img: "imprimante laser.png" }
                    ]
                },
                "Papeterie & Bureau-Arts": {
                    desc: "Fournitures de bureau et articles pour les beaux-arts de haute qualité.",
                    items: [
                        { name: "Papeterie", img: "fourniture-de-bureau-tunisie-1024x647-1-770x500.png" },
                        { name: "Bureau-Arts", img: "bureau.png" }
                    ]
                },
                "Électroménager & Sanitaire": {
                    desc: "Équipements et machines haute technologie.",
                    items: [
                        { name: "Électroménager", img: "Électroménager.jpg" },
                        { name: "Sanitaire", img: "Sanitaire.jpg" }
                    ]
                },
                "Équipement Éducatif": {
                    desc: "Matériel pour l'enseignement et collectivités.",
                    items: [{ name: "Équipement Éducatif", img: "Équipement Éducatif.jpg" }]
                },
                "Para-pharmaceutique": {
                    desc: "Produits d'hygiène et para-pharmacie.",
                    items: [{ name: "Para-pharmaceutique", img: "Para-pharmaceutique.jpg" }]
                }
            }
        };

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'fr' : 'ar';
            const html = document.getElementById('html-tag');
            html.setAttribute('lang', currentLang);
            html.setAttribute('dir', currentLang === 'ar' ? 'rtl' : 'ltr');
            updateUI();
        }

        function updateUI() {
            const nameVal = document.getElementById('cust-name').value;
            const phoneVal = document.getElementById('cust-phone').value;
            const qtyVal = document.getElementById('cust-qty').value;

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = translations[currentLang][key];
            });

            renderCategories();
            populateWilayas();

            // تحديث المنتجات إذا كانت مفتوحة
            if (currentCategory) {
                const keysAr = Object.keys(catalogData.ar);
                const keysFr = Object.keys(catalogData.fr);
                let newKey = "";
                
                // العثور على المفتاح المقابل في اللغة الأخرى
                if(currentLang === 'fr') {
                    const index = keysAr.indexOf(currentCategory);
                    newKey = keysFr[index];
                } else {
                    const index = keysFr.indexOf(currentCategory);
                    newKey = keysAr[index];
                }
                if(newKey) showCategory(newKey);
            }

            document.getElementById('cust-name').value = nameVal;
            document.getElementById('cust-phone').value = phoneVal;
            document.getElementById('cust-qty').value = qtyVal;
        }

        function populateWilayas() {
            const select = document.getElementById('cust-wilaya');
            const currentVal = select.value;
            select.innerHTML = `<option value="" disabled ${!currentVal ? 'selected' : ''}>${currentLang === 'ar' ? 'اختر الولاية' : 'Sélectionner Wilaya'}</option>`;
            wilayas.forEach(w => {
                const opt = document.createElement('option');
                opt.value = w;
                opt.textContent = w;
                select.appendChild(opt);
            });
            if(currentVal) select.value = currentVal;
        }

        function renderCategories() {
            const grid = document.getElementById('category-grid');
            grid.innerHTML = '';
            const cats = catalogData[currentLang];
            Object.keys(cats).forEach(key => {
                grid.innerHTML += `
                    <div class="glass p-8 category-card rounded-3xl" onclick="showCategory('${key}')">
                        <h3 class="text-xl font-bold mb-3 uppercase">${key}</h3>
                        <p class="text-sm text-gray-500 leading-relaxed italic">${cats[key].desc}</p>
                    </div>`;
            });
        }

        function showCategory(key) {
            currentCategory = key;
            document.getElementById('main-content').classList.add('hidden');
            document.getElementById('product-view').classList.remove('hidden');
            document.getElementById('view-title').innerText = key;
            const data = catalogData[currentLang][key];
            document.getElementById('view-desc').innerText = data.desc;
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            data.items.forEach(item => {
                grid.innerHTML += `
                    <div class="glass p-6 rounded-3xl group">
                        <div class="aspect-square bg-white/5 rounded-2xl mb-6 flex items-center justify-center overflow-hidden">
                            <img src="${item.img}" class="w-full h-full object-contain p-4 group-hover:scale-110 transition-transform duration-500" alt="${item.name}">
                        </div>
                        <h4 class="font-bold text-white uppercase mb-2 text-sm">${item.name}</h4>
                        <button onclick="openOrderModal('${item.name}')" class="w-full block text-center py-3 border border-[#d4af37]/30 rounded-xl text-[10px] font-bold text-[#d4af37] hover:bg-[#d4af37] hover:text-black transition uppercase">
                            ${translations[currentLang].quote}
                        </button>
                    </div>`;
            });
            window.scrollTo(0,0);
        }

        function openOrderModal(itemName) {
            document.getElementById('modal-product-name').innerText = itemName;
            document.getElementById('order-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('order-modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function showHome() {
            currentCategory = "";
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('product-view').classList.add('hidden');
        }

        document.getElementById('order-form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert(translations[currentLang]["order-success"]);
            this.reset();
            document.getElementById('cust-qty').value = 1;
            closeModal();
        });

        updateUI();
    </script>
</body>
</html>

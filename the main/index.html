<!DOCTYPE html>

    <title>La Ganeante Fourniture | Oran</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Noto+Sans+Arabic:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main-font: 'Noto Sans Arabic', 'Plus Jakarta Sans', sans-serif; }
        body { font-family: var(--main-font); background-color: #050505; color: #fff; overflow-x: hidden; transition: all 0.3s ease; }
        .gold-gradient { background: linear-gradient(135deg, #d4af37 0%, #f1d592 50%, #b8860b 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px); }
        .category-card { cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .category-card:hover { border-color: #d4af37; transform: translateY(-10px); background: rgba(212, 175, 55, 0.05); }
        .btn-gold { background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%); }
        [dir="ltr"] .nav-links { flex-direction: row; }
        [dir="rtl"] .nav-links { flex-direction: row-reverse; }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="fixed w-full z-50 glass px-8 py-4 flex justify-between items-center top-0">
        <div class="text-2xl font-extrabold tracking-tighter gold-gradient uppercase">La Ganeante</div>
        <div class="hidden md:flex gap-8 text-[12px] font-bold uppercase tracking-widest text-gray-400 nav-links">

            <a href="#catalogue" onclick="showHome()" data-i18n="nav-catalog" class="hover:text-white transition">الكتالوج</a>
        </div>
        <a href="tel:0558742463" class="bg-white text-black px-6 py-2 rounded-full font-bold text-xs hover:bg-[#d4af37] transition">0558742463</a>
    </nav>

    <main id="main-content">
        <!-- Hero Section -->
        <section id="hero" class="h-screen flex flex-col justify-center items-center text-center px-6">
            <span class="text-[#d4af37] text-xs font-bold tracking-[0.3em] uppercase mb-4 italic" data-i18n="hero-location">وهران، الجزائر</span>
            <h1 class="text-5xl md:text-8xl font-black mb-6 leading-tight tracking-tighter uppercase">
                <span data-i18n="hero-title-1">شريككم في</span> <br> <span class="gold-gradient italic" data-i18n="hero-title-2">النجاح</span>
            </h1>
            <p class="max-w-2xl text-gray-500 text-lg font-light leading-relaxed mb-10" data-i18n="hero-desc">
                بيع بالجملة في عدة قطاعات: الإعلام الآلي، الأدوات المكتبية، الأثاث، والأجهزة الكهرومنزلية.
            </p>
            <button onclick="document.getElementById('catalogue').scrollIntoView()" class="btn-gold text-black px-10 py-4 rounded-xl font-black uppercase text-xs" data-i18n="hero-btn">استكشف الكتالوج</button>
        </section>

        <!-- Categories Section -->
        <section id="catalogue" class="py-24 px-8 max-w-7xl mx-auto">
            <div class="mb-16">
                <h2 class="text-4xl font-black uppercase tracking-tighter italic">
                    <span data-i18n="cat-title-1">نشاطاتنا</span> <span class="text-[#d4af37]" data-i18n="cat-title-2">الرئيسية</span>
                </h2>
                <div class="h-1 w-20 bg-[#d4af37] mt-4"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="category-grid">
                <!-- Categories will be generated by JS to handle language -->
            </div>
        </section>
    </main>

    <!-- Product Display -->
    <section id="product-view" class="hidden pt-32 pb-24 px-8 max-w-7xl mx-auto min-h-screen">
        <button onclick="showHome()" class="text-[#d4af37] text-xs font-bold uppercase tracking-widest mb-12 flex items-center gap-2 hover:opacity-70 transition" data-i18n="back-btn">
            &rarr; العودة إلى الكتالوج
        </button>
        <h2 id="view-title" class="text-5xl md:text-7xl font-black uppercase tracking-tighter mb-4 gold-gradient"></h2>
        <p id="view-desc" class="text-gray-500 mb-16 max-w-2xl text-lg"></p>
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
    </section>

    <footer class="py-12 border-t border-white/5 px-8 flex flex-col md:flex-row justify-between items-center text-[10px] text-gray-600 uppercase tracking-[0.2em]">

        <div class="flex gap-8 mt-4 md:mt-0">
            <span>0558 74 24 63</span>
        </div>
    </footer>

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'fr' : 'ar';
            const html = document.getElementById('html-tag');
            html.setAttribute('lang', currentLang);
            html.setAttribute('dir', currentLang === 'ar' ? 'rtl' : 'ltr');
            updateUI();
        }

        function updateUI() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = translations[currentLang][key];
            });
            renderCategories();
        }

async function renderCategories() {
    const grid = document.getElementById('category-grid');
    grid.innerHTML = '<p>جاري التحميل...</p>';

    try {
        const querySnapshot = await getDocs(collection(db, "categories"));
        grid.innerHTML = ''; 

        querySnapshot.forEach((doc) => {
            const data = doc.data();
            
            const title = (currentLang === 'ar') ? data.key_1ar : data.key_1fr;
            const description = (currentLang === 'ar') ? data.desc_ar : data.desc_fr;

            grid.innerHTML += `
                <div class="glass p-8 category-card rounded-3xl" onclick="showCategory('${doc.id}')">
                    <h3 class="text-xl font-bold mb-3 uppercase">${title}</h3>
                    <p class="text-sm text-gray-500 leading-relaxed italic">${description}</p>
                </div>`;
        });
    } catch (error) {
        console.error("خطأ في جلب البيانات:", error);
    }
}

        function showCategory(key) {
            document.getElementById('main-content').classList.add('hidden');
            document.getElementById('product-view').classList.remove('hidden');
            document.getElementById('view-title').innerText = key;
            const data = catalogData[currentLang][key];
            document.getElementById('view-desc').innerText = data.desc;
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            data.items.forEach(item => {
                grid.innerHTML += `
                    <div class="glass p-6 rounded-3xl group">
                        <div class="aspect-square bg-white/5 rounded-2xl mb-6 flex items-center justify-center overflow-hidden">
                            <img src="${item.img}" class="w-full h-full object-contain p-4 group-hover:scale-110 transition-transform duration-500">
                        </div>
                        <h4 class="font-bold text-white uppercase mb-2">${item.name}</h4>
                        <a href="tel:0558742463" class="block text-center py-3 border border-[#d4af37]/30 rounded-xl text-[10px] font-bold text-[#d4af37] hover:bg-[#d4af37] hover:text-black transition uppercase">${translations[currentLang].quote}</a>
                    </div>`;
            });
            window.scrollTo(0,0);
        }

        function showHome() {
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('product-view').classList.add('hidden');
        }

        updateUI(); // Initialize
    </script>

</html>
